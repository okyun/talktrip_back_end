worker_processes auto;
worker_rlimit_nofile 200000;

# nginx 이벤트 모듈 설정
events {
    # 각 워커 프로세스가 동시에 처리할 수 있는 최대 연결 수
    worker_connections 1024;
}

# HTTP 모듈 설정
http {
    # ========================================
    # 로그 포맷 정의
    # ========================================
    
    # 기본 로그 포맷 (main)
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    # 상세 로그 포맷 (detailed)
    log_format detailed '$remote_addr - $remote_user [$time_local] "$request" '
                       '$status $body_bytes_sent "$http_referer" '
                       '"$http_user_agent" "$http_x_forwarded_for" '
                       'rt=$request_time uct="$upstream_connect_time" '
                       'uht="$upstream_header_time" urt="$upstream_response_time" '
                       'upstream_addr="$upstream_addr" '
                       'upstream_status="$upstream_status"';

    # ========================================
    # 기본 로그 설정
    # ========================================
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
    
    # ========================================
    # 로컬 환경용 업스트림 서버 그룹 정의
    # ========================================
    # 로컬에서는 host.docker.internal을 통해 호스트의 Spring Boot 애플리케이션에 접근
    upstream backend {
        server host.docker.internal:8080;  # 로컬 Spring Boot 애플리케이션
        keepalive 64;
    }

    # ========================================
    # 가상 서버 설정
    # ========================================
    server {
        listen 80;
        server_name localhost;

        # ========================================
        # Health Check 엔드포인트
        # ========================================
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ========================================
        # API 라우트 (/api/*)
        # ========================================
        location /api/ {
            # 프록시 설정
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========================================
        # WebSocket 지원 (/ws/*)
        # ========================================
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========================================
        # SockJS 지원 (/sockjs-node/*)
        # ========================================
        location /sockjs-node/ {
            access_log /var/log/nginx/sockjs_access.log detailed;
            
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========================================
        # 기본 라우트 (/*)
        # ========================================
        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
