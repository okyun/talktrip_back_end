worker_processes auto;
worker_rlimit_nofile 200000;
# nginx 이벤트 모듈 설정
events {
    # 각 워커 프로세스가 동시에 처리할 수 있는 최대 연결 수
    # 높은 동시 연결을 처리하기 위해 1024로 설정
    worker_connections 1024;
}

# HTTP 모듈 설정
http {
    # ========================================
    # 로그 포맷 정의
    # ========================================
    
    # 기본 로그 포맷 (main)
    # - 클라이언트 IP, 사용자, 시간, 요청, 상태코드, 응답크기, 리퍼러, User-Agent, X-Forwarded-For
    # - 응답시간(rt), 업스트림 연결시간(uct), 업스트림 헤더시간(uht), 업스트림 응답시간(urt)
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    # 상세 로그 포맷 (detailed)
    # - 기본 포맷 + 업스트림 서버 주소, 업스트림 상태코드
    # - API, WebSocket 등 중요한 요청에 사용
    log_format detailed '$remote_addr - $remote_user [$time_local] "$request" '
                       '$status $body_bytes_sent "$http_referer" '
                       '"$http_user_agent" "$http_x_forwarded_for" '
                       'rt=$request_time uct="$upstream_connect_time" '
                       'uht="$upstream_header_time" urt="$upstream_response_time" '
                       'upstream_addr="$upstream_addr" '
                       'upstream_status="$upstream_status"';

    # ========================================
    # 기본 로그 설정
    # ========================================
    # 전체 접근 로그 (기본 포맷 사용)
    access_log /var/log/nginx/access.log main;
    # 에러 로그 (warn 레벨 이상만 기록)
    error_log /var/log/nginx/error.log warn;
    
    # ========================================
    # 업스트림 서버 그룹 정의 (로드 밸런싱)
    # ========================================
    # Spring Boot 애플리케이션 서버들을 로드 밸런싱
    # 기본적으로 라운드 로빈 방식으로 요청을 분산
    upstream backend {
        least_conn;                # 기본 round-robin → 혼잡시 유리
        server talktrip-app-1:8080;  # Docker 컨테이너 내부 Spring Boot 애플리케이션 (메인)
        server talktrip-app-2:8080;  # Docker 컨테이너 내부 Spring Boot 애플리케이션 (두 번째 인스턴스) - 로그 확인을 위해 주석 처리
        server talktrip-app-3:8080;  # Docker 컨테이너 내부 Spring Boot 애플리케이션 (세 번째 인스턴스) - 로그 확인을 위해 주석 처리
        keepalive 64;              # 커넥션 재사용
    }

    # ========================================
    # 가상 서버 설정
    # ========================================
    server {
        # 포트 80에서 HTTP 요청 수신
        listen 80;
        # 서버 이름 (localhost로 접근하는 요청 처리)
        server_name localhost;

        # ========================================
        # Health Check 엔드포인트
        # ========================================
        # Docker 컨테이너 헬스체크용 엔드포인트
        # 로드 밸런서나 모니터링 시스템에서 서버 상태 확인용
        # Health: 로그 끄기(폭주 방지) + 단순 응답
        location /health {
            # Health check는 별도 로그 파일에 기록 (빈도가 높으므로)
            #access_log /var/log/nginx/health_check.log main;
            access_log off;
            # 항상 200 OK와 "healthy" 메시지 반환
            return 200 "healthy\n";
            # 응답 헤더 설정
            add_header Content-Type text/plain;
        }

        # ========================================
        # API 라우트 (/api/*)
        # ========================================
        # Spring Boot REST API 요청을 백엔드 서버로 프록시
        # CORS 설정 포함, 상세 로깅 적용
        location /api/ {
            # API 전용 로깅 (상세 포맷 사용)
            # access_log /var/log/nginx/api_access.log detailed; # 필요시만 활성화
            
            # ========================================
            # 프록시 설정
            # ========================================
            # 백엔드 서버로 요청 전달
            proxy_pass http://backend;
            # 원본 호스트 정보 전달
            proxy_set_header Host $host;
            # 클라이언트 실제 IP 주소 전달
            proxy_set_header X-Real-IP $remote_addr;
            # 프록시 체인 정보 전달
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # 원본 프로토콜 정보 전달 (HTTP/HTTPS)
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # ========================================
            # CORS는 Spring Boot에서 처리
            # ========================================
            
            # ========================================
            # CORS Preflight 요청은 Spring Boot에서 처리
            # ========================================
        }

        # ========================================
        # WebSocket 지원 (/ws/*)
        # ========================================
        # 실시간 양방향 통신을 위한 WebSocket 연결 처리
        # 채팅, 알림 등 실시간 기능에 사용
        location /ws/ {
            # WebSocket 전용 로깅 (상세 포맷 사용)
            # access_log /var/log/nginx/websocket_access.log detailed;
            
            # ========================================
            # WebSocket 프록시 설정
            # ========================================
            # 백엔드 서버로 WebSocket 연결 전달
            proxy_pass http://backend;
            # HTTP/1.1 프로토콜 사용 (WebSocket 필수)
            proxy_http_version 1.1;
            # HTTP에서 WebSocket으로 프로토콜 업그레이드 요청
            proxy_set_header Upgrade $http_upgrade;
            # 연결을 업그레이드 모드로 설정
            proxy_set_header Connection "upgrade";
            # 원본 호스트 정보 전달
            proxy_set_header Host $host;
            # 클라이언트 실제 IP 주소 전달
            proxy_set_header X-Real-IP $remote_addr;
            # 프록시 체인 정보 전달
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # 원본 프로토콜 정보 전달
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========================================
        # SockJS 지원 (/sockjs-node/*)
        # ========================================
        # WebSocket 폴백을 위한 SockJS 라이브러리 지원
        # WebSocket이 지원되지 않는 환경에서의 실시간 통신
        location /sockjs-node/ {
            # SockJS 전용 로깅 (상세 포맷 사용)
            access_log /var/log/nginx/sockjs_access.log detailed;
            
            # ========================================
            # SockJS 프록시 설정
            # ========================================
            # 백엔드 서버로 SockJS 연결 전달
            proxy_pass http://backend;
            # HTTP/1.1 프로토콜 사용
            proxy_http_version 1.1;
            # HTTP에서 WebSocket으로 프로토콜 업그레이드 요청
            proxy_set_header Upgrade $http_upgrade;
            # 연결을 업그레이드 모드로 설정
            proxy_set_header Connection "upgrade";
            # 원본 호스트 정보 전달
            proxy_set_header Host $host;
            # 클라이언트 실제 IP 주소 전달
            proxy_set_header X-Real-IP $remote_addr;
            # 프록시 체인 정보 전달
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # 원본 프로토콜 정보 전달
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========================================
        # 기본 라우트 (/*)
        # ========================================
        # 위의 특정 라우트에 매치되지 않는 모든 요청 처리
        # 정적 파일, 기본 페이지 등 일반적인 웹 요청
        location / {
            # 일반 요청 로깅 (기본 포맷 사용)
            # access_log /var/log/nginx/general_access.log main; # 기본만 유지
            
            # ========================================
            # 기본 프록시 설정
            # ========================================
            # 백엔드 서버로 요청 전달
            proxy_pass http://backend;
            # 원본 호스트 정보 전달
            proxy_set_header Host $host;
            # 클라이언트 실제 IP 주소 전달
            proxy_set_header X-Real-IP $remote_addr;
            # 프록시 체인 정보 전달
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # 원본 프로토콜 정보 전달 (HTTP/HTTPS)
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
