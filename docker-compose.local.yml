version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: talktrip-mysql-local
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: talktrip
      MYSQL_USER: talktrip
      MYSQL_PASSWORD: talktrip123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_local:/var/lib/mysql
      - ./init-db-simple.sql:/docker-entrypoint-initdb.d/init-db-simple.sql
    networks:
      - talktrip-local-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: talktrip-redis-local
    ports:
      - "6379:6379"
    networks:
      - talktrip-local-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 20s
      retries: 10

  nginx:
    image: nginx:alpine
    container_name: talktrip-nginx-local
    ports:
      - "80:80"
    volumes:
      - ./nginx-local.conf:/etc/nginx/nginx.conf
    depends_on:
      - mysql
      - redis
    networks:
      - talktrip-local-network

volumes:
  mysql_data_local:

networks:
  talktrip-local-network:
    driver: bridge
